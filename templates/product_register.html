<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상품 등록</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f3f4f6;
        }

        .container {
            width: 420px;
            margin: 70px auto;
            padding: 30px;
            background-color: white;
            border: 1px solid #dddddd;
            border-radius: 10px;
        }

        h1 {
            margin-top: 0;
            text-align: center;
        }

        label {
            display: block;
            margin-top: 16px;
            margin-bottom: 6px;
        }

        input {
            box-sizing: border-box;
            width: 100%;
            padding: 11px;
            border: 1px solid #cccccc;
            border-radius: 5px;
        }

        button,
        .back-link {
            box-sizing: border-box;
            display: block;
            width: 100%;
            margin-top: 18px;
            padding: 11px;
            border: none;
            border-radius: 5px;
            text-align: center;
            text-decoration: none;
            font-size: 15px;
        }

        button {
            background-color: #222222;
            color: white;
            cursor: pointer;
        }

        .back-link {
            background-color: #e5e7eb;
            color: #222222;
        }

        .message {
            padding: 10px;
            margin-bottom: 15px;
            background-color: #fee2e2;
            color: #991b1b;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>상품 등록</h1>

        {% if message %}
        <div class="message">
            {{ message }}
        </div>
        {% endif %}

        <form
            method="POST"
            action="/products/register"
            enctype="multipart/form-data"
        >
            <label for="name">상품명</label>
            <input
                type="text"
                id="name"
                name="name"
                required
            >

            <label for="price">상품 금액</label>
            <input
                type="number"
                id="price"
                name="price"
                min="1"
                required
            >

            <label for="image">상품 사진</label>
            <input
                type="file"
                id="image"
                name="image"
                accept=".jpg,.jpeg,.png,.webp"
                required
            >

            <button type="submit">상품 등록하기</button>
        </form>

        <a class="back-link" href="/main">
            메인 화면으로
        </a>
    </div>
</body>
</html>
