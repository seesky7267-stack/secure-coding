<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f3f4f6;
        }

        .register-container {
            width: 360px;
            margin: 80px auto;
            padding: 30px;
            background-color: white;
            border: 1px solid #dddddd;
            border-radius: 10px;
        }

        h1 {
            margin-top: 0;
            text-align: center;
        }

        label {
            display: block;
            margin-top: 16px;
            margin-bottom: 6px;
        }

        input {
            box-sizing: border-box;
            width: 100%;
            padding: 11px;
            border: 1px solid #cccccc;
            border-radius: 5px;
        }

        button,
        .back-link {
            box-sizing: border-box;
            display: block;
            width: 100%;
            margin-top: 18px;
            padding: 11px;
            border: none;
            border-radius: 5px;
            text-align: center;
            text-decoration: none;
            font-size: 15px;
        }

        button {
            background-color: #222222;
            color: white;
            cursor: pointer;
        }

        .back-link {
            background-color: #e5e7eb;
            color: #222222;
        }

        .message {
            padding: 10px;
            margin-bottom: 15px;
            background-color: #fee2e2;
            color: #991b1b;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <div class="register-container">
        <h1>회원가입</h1>

        {% if message %}
        <div class="message">
            {{ message }}
        </div>
        {% endif %}

        <form method="POST" action="/register">
            <label for="username">아이디</label>
            <input
                type="text"
                id="username"
                name="username"
                required
            >

            <label for="password">비밀번호</label>
            <input
                type="password"
                id="password"
                name="password"
                required
            >

            <label for="password_confirm">비밀번호 확인</label>
            <input
                type="password"
                id="password_confirm"
                name="password_confirm"
                required
            >

            <button type="submit">계정 생성</button>
        </form>

        <a class="back-link" href="/">
            로그인 페이지로
        </a>
    </div>
</body>
</html>
