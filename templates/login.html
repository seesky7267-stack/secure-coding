<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>중고거래 플랫폼 로그인</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f3f4f6;
        }

        .login-container {
            width: 360px;
            margin: 120px auto;
            padding: 30px;
            background-color: white;
            border: 1px solid #dddddd;
            border-radius: 10px;
        }

        h1 {
            margin-top: 0;
            text-align: center;
            font-size: 26px;
        }

        label {
            display: block;
            margin-top: 16px;
            margin-bottom: 6px;
        }

        input {
            box-sizing: border-box;
            width: 100%;
            padding: 11px;
            border: 1px solid #cccccc;
            border-radius: 5px;
        }

        button,
        .register-link {
            box-sizing: border-box;
            display: block;
            width: 100%;
            margin-top: 18px;
            padding: 11px;
            border: none;
            border-radius: 5px;
            text-align: center;
            text-decoration: none;
            font-size: 15px;
            cursor: pointer;
        }

        button {
            background-color: #222222;
            color: white;
        }

        .register-link {
            background-color: #e5e7eb;
            color: #222222;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <h1>중고거래 플랫폼</h1>

        <form method="POST" action="/login">
            <label for="username">아이디</label>
            <input
                type="text"
                id="username"
                name="username"
                required
            >

            <label for="password">비밀번호</label>
            <input
                type="password"
                id="password"
                name="password"
                required
            >

            <button type="submit">로그인</button>
        </form>

        <a class="register-link" href="/register">
            회원가입하기
        </a>
    </div>
</body>
</html>
