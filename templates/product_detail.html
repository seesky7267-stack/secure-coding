<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ product.name }}</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f3f4f6;
        }

        .container {
            width: 700px;
            margin: 50px auto;
            padding: 30px;
            background-color: white;
            border: 1px solid #dddddd;
            border-radius: 10px;
        }

        .product-image {
            display: block;
            width: 500px;
            height: 500px;
            margin: 0 auto 25px;
            object-fit: cover;
            border-radius: 8px;
        }

        .product-info {
            text-align: center;
        }

        .price {
            font-size: 22px;
            font-weight: bold;
        }

        .balance {
            margin-top: 20px;
            padding: 12px;
            background-color: #f9fafb;
            border-radius: 5px;
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            background-color: #fee2e2;
            color: #991b1b;
            border-radius: 5px;
        }

        .button-area {
            margin-top: 30px;
            text-align: center;
        }

        .purchase-button,
        .sold-button,
        .back-button {
            display: inline-block;
            min-width: 130px;
            margin: 5px;
            padding: 12px 18px;
            border: none;
            border-radius: 5px;
            text-decoration: none;
            font-size: 15px;
        }

        .purchase-button {
            background-color: #222222;
            color: white;
            cursor: pointer;
        }

        .sold-button {
            background-color: #9ca3af;
            color: white;
            cursor: not-allowed;
        }

        .back-button {
            background-color: #e5e7eb;
            color: #222222;
        }

        form {
            display: inline;
        }
    </style>
</head>

<body>
    <div class="container">
        <img
            class="product-image"
            src="{{ url_for('static', filename='uploads/' + product.image_filename) }}"
            alt="{{ product.name }}"
        >

        <div class="product-info">
            <h1>{{ product.name }}</h1>

            <p class="price">
                {{ "{:,}".format(product.price) }}원
            </p>

            <div class="balance">
                현재 잔액:
                {{ "{:,}".format(user.balance) }}원
            </div>

            {% if message %}
            <div class="message">
                {{ message }}
            </div>
            {% endif %}
        </div>

        <div class="button-area">
            {% if product.is_sold %}
                <button class="sold-button" disabled>
                    판매 완료
                </button>

            {% elif product.seller_id == user.id %}
                <button class="sold-button" disabled>
                    자신의 상품
                </button>

            {% else %}
                <form
                    method="POST"
                    action="{{ url_for('purchase_product', product_id=product.id) }}"
                >
                    <input type="hidden" name="back_url" value="{{ back_url }}">

                    <button class="purchase-button" type="submit">
                        구매하기
                    </button>
                </form>
            {% endif %}

            <a class="back-button" href="{{ back_url }}">
                뒤로가기
            </a>
        </div>
    </div>
</body>
</html>
